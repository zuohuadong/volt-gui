# CNB 云原生构建配置 — 西谷智灯暗涌系统 (西谷 AI fork of VoltUI)
# 参考: https://docs.cnb.cool/zh/build/configuration.md
#
# 本项目的 CNB CI 只构建 Windows 桌面版本 (Wails)，CLI/macOS/Linux 产物不发版。
# CNB CI 当前使用 Linux Docker runner，发布阶段交叉编译 Windows amd64 桌面包，
# 并用 Linux nsis/makensis 生成安装器。
#
# Tag 命名空间:
#   desktop-v* → CNB 自动发布桌面端构建
#
# 触发条件:
#   推送 feat:/fix:/feat!:/fix!: 等约定式提交到 main → 自动发版
#   - feat:     → minor 版本升级 (v0.1.0 → v0.2.0)
#   - fix:      → patch 版本升级 (v0.1.0 → v0.1.1)
#   - feat!:    → major 版本升级 (v0.1.0 → v1.0.0)
#   - chore:/docs:/ci: 等 → 仅构建验证，不发版
#   - 提交消息含 [skip-release] → 跳过自动发版

main:
  push:
    # Pipeline 1: Windows 桌面发布链路的快速编译验证（每次 push 都执行）
    # Docker 中无法做完整 Wails/NSIS 打包，只验证 desktop Go 模块与发布辅助命令。
    - docker:
        image: golang:1.26
      env:
        XIGU_BRAND_NAME: "西谷智灯暗涌系统"
      stages:
        - name: desktop-build
          script: |
            cd desktop

            # Stub embedded frontend (Wails embeds frontend/dist)
            mkdir -p frontend/dist
            echo '<!doctype html><title>ci</title>' > frontend/dist/index.html

            # Resolve deps (desktop is a nested Go module)
            go mod tidy
            CGO_ENABLED=0 go vet ./...
            CGO_ENABLED=0 go build ./...

        - name: windows-release-tools-test
          script: |
            cd desktop

            mkdir -p frontend/dist
            echo '<!doctype html><title>ci</title>' > frontend/dist/index.html

            # Only test sub-packages that don't need Wails runtime
            # (desktop main package requires Wails CGO/WebView — can't run in Docker)
            go test ./cmd/sign ./cmd/cnbrelease ./internal/update

    # Pipeline 2: 自动发版（仅约定式提交触发）
    # CNB 直接构建 Windows 桌面端、生成 SHA-256 manifest，并上传 CNB Release 资产
    # imports 导入密钥仓库文件 (.cnb/envs.yml), 提供 XIGU_API_KEY 给 build-windows-desktop;
    # env 里的同名 key 优先于 imports.
    - docker:
        image: golang:1.26
      imports:
        - https://cnb.cool/aizhuliren/xgic/anyong-agent/-/blob/main/.cnb/envs.yml
      env:
        GIT_AUTHOR_NAME: "西谷智灯暗涌系统 Bot"
        GIT_AUTHOR_EMAIL: "bot@xigu.ai"
        GIT_COMMITTER_NAME: "西谷智灯暗涌系统 Bot"
        GIT_COMMITTER_EMAIL: "bot@xigu.ai"
        XIGU_BRAND_NAME: "西谷智灯暗涌系统"
        VOLTUI_BRAND_NAME: "西谷智灯暗涌系统"
        DESKTOP_APP_NAME: "Anyong"   # release artifact prefix (Anyong-windows-amd64-...); overrides upstream VoltUI
      stages:
        - name: resolve-release
          script: |
            MSG="${CNB_COMMIT_MESSAGE}"

            # 跳过标记
            if echo "$MSG" | grep -q '\[skip-release\]'; then
              echo "[skip-release] detected, skipping"
              touch .release_skip
              exit 0
            fi

            # 判断是否为约定式提交的 feat/fix/feat!/fix!
            if echo "$MSG" | grep -qE '^(feat|fix)(\(.+\))?!?:'; then
              echo "Conventional commit detected: $MSG"
            else
              echo "Not a release commit (need feat:/fix:), skipping"
              touch .release_skip
              exit 0
            fi

            # 获取最新 desktop-v* tag 并计算新版本号
            git fetch --tags origin 2>/dev/null || true
            LATEST_TAG=$(git tag -l --sort=-version:refname | grep -E '^desktop-v[0-9]' | head -1 || true)

            # 首次发版: 直接用 0.1.0，不递增
            if [ -z "$LATEST_TAG" ]; then
              DESKTOP_TAG="desktop-v0.1.0"
            else
              VERSION_BASE=$(echo "$LATEST_TAG" | sed 's/^desktop-v//')
              MAJOR=$(echo "$VERSION_BASE" | cut -d. -f1)
              MINOR=$(echo "$VERSION_BASE" | cut -d. -f2)
              PATCH=$(echo "$VERSION_BASE" | cut -d. -f3 | cut -d- -f1)

              # 根据提交类型决定版本号升级
              # feat!:/fix!: → major, feat: → minor, fix: → patch
              if echo "$MSG" | grep -qE '^(feat|fix)(\(.+\))?!:'; then
                NEW_MAJOR=$((MAJOR + 1))
                DESKTOP_TAG="desktop-v${NEW_MAJOR}.0.0"
              elif echo "$MSG" | grep -qE '^feat(\(.+\))?:'; then
                NEW_MINOR=$((MINOR + 1))
                DESKTOP_TAG="desktop-v${MAJOR}.${NEW_MINOR}.0"
              else
                NEW_PATCH=$((PATCH + 1))
                DESKTOP_TAG="desktop-v${MAJOR}.${MINOR}.${NEW_PATCH}"
              fi
            fi

            echo "Latest tag: ${LATEST_TAG:-none} → New: $DESKTOP_TAG"

            VERSION="${DESKTOP_TAG#desktop-}"
            PRERELEASE=false
            case "$VERSION" in *-*) PRERELEASE=true ;; esac

            cat > .release_env <<EOF
            DESKTOP_TAG=$DESKTOP_TAG
            VERSION=$VERSION
            PRERELEASE=$PRERELEASE
            LATEST_TAG=$LATEST_TAG
            EOF

        - name: install-desktop-release-deps
          script: |
            if [ -f .release_skip ]; then
              exit 0
            fi

            apt-get update
            apt-get install -y \
              ca-certificates \
              curl \
              nsis \
              xz-utils \
              zip

            curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
            apt-get install -y nodejs
            npm install -g pnpm@10

            go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
            wails doctor || true

        - name: build-windows-desktop
          script: |
            if [ -f .release_skip ]; then
              exit 0
            fi
            . ./.release_env

            rm -rf dist desktop/build/bin
            # XIGU_API_KEY (CNB secret, 由 imports/env 注入) 在 desktop-build.sh 里
            # 落盘为随包发布的 OEM 网关密钥 sidecar (bundled.env)；缺失时不影响构建。
            # Windows is built by cross-compiling Wails from the CNB Linux container.
            # macOS and Linux targets are intentionally disabled for now:
            #   scripts/desktop-build.sh darwin/universal "$VERSION"
            #   scripts/desktop-build.sh linux/amd64 "$VERSION"
            scripts/desktop-build.sh windows/amd64 "$VERSION"

        - name: generate-manifest
          script: |
            if [ -f .release_skip ]; then
              exit 0
            fi
            . ./.release_env

            cd desktop
            REPO_BASE="${CNB_REPO_URL_HTTPS:-https://cnb.cool/${CNB_REPO_SLUG}}"
            RELEASE_DOWNLOAD_PAGE="${REPO_BASE}/-/releases" \
              RELEASE_ASSET_BASE_URL="${REPO_BASE}/-/releases/download/${DESKTOP_TAG}" \
              go run ./cmd/sign manifest ../dist "$VERSION" "$DESKTOP_TAG"

        - name: publish-cnb-release
          script: |
            if [ -f .release_skip ]; then
              exit 0
            fi
            . ./.release_env

            BRAND="${XIGU_BRAND_NAME:-西谷智灯暗涌系统}"

            if [ -n "$LATEST_TAG" ]; then
              CHANGELOG=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"- %s" 2>/dev/null || echo "- 参见提交记录")
            else
              CHANGELOG=$(git log --pretty=format:"- %s" -10 2>/dev/null || echo "- 参见提交记录")
            fi

            BODY="${BRAND} ${DESKTOP_TAG} 发布

            ## 变更记录
            ${CHANGELOG}

            ---

            CNB 已构建并上传 Windows amd64 桌面端安装包。macOS、Linux 和 CLI 产物不会由 CNB 构建或发布。"

            # 创建 desktop-v* tag，保持版本命名空间一致
            git config user.name "$GIT_COMMITTER_NAME"
            git config user.email "$GIT_COMMITTER_EMAIL"
            git tag "$DESKTOP_TAG"
            git push origin "$DESKTOP_TAG"

            cd desktop
            go run ./cmd/cnbrelease \
              --tag "$DESKTOP_TAG" \
              --version "$VERSION" \
              --dist ../dist \
              --brand "$BRAND" \
              --body "$BODY" \
              --prerelease="$PRERELEASE"

  # ------------------------------------------------------------------
  # 合并请求：Windows 桌面发布链路快速检查
  # ------------------------------------------------------------------
  merge-request:
    - docker:
        image: golang:1.26
      stages:
        - name: desktop-build-check
          script: |
            cd desktop
            mkdir -p frontend/dist
            echo '<!doctype html><title>ci</title>' > frontend/dist/index.html
            go mod tidy
            CGO_ENABLED=0 go vet ./...
            CGO_ENABLED=0 go build ./...

        - name: windows-release-tools-check
          script: |
            cd desktop
            go test ./cmd/sign ./cmd/cnbrelease ./internal/update

  # ------------------------------------------------------------------
  # 定时同步上游 (每天 09:00 CST)
  # ------------------------------------------------------------------
  "crontab: 0 9 * * *":
    - name: sync-upstream
      docker:
        image: golang:1.26
      env:
        GIT_AUTHOR_NAME: "西谷智灯暗涌系统 Bot"
        GIT_AUTHOR_EMAIL: "bot@xigu.ai"
        GIT_COMMITTER_NAME: "西谷智灯暗涌系统 Bot"
        GIT_COMMITTER_EMAIL: "bot@xigu.ai"
      stages:
        - name: configure-git
          script: |
            git config --global user.name "$GIT_COMMITTER_NAME"
            git config --global user.email "$GIT_COMMITTER_EMAIL"
            git config --global init.defaultBranch main

        - name: sync-upstream
          script: |
            chmod +x scripts/sync-upstream.sh
            bash scripts/sync-upstream.sh || {
              echo "::warning:: Upstream sync had issues, check logs"
              exit 0
            }

        - name: create-pull-request
          script: |
            DATE_STAMP=$(date +%Y-%m-%d)
            SYNC_BRANCH="sync/upstream-${DATE_STAMP}"

            git push origin "$SYNC_BRANCH" --force-with-lease 2>/dev/null || true

            RESPONSE=$(curl -s -X POST \
              "${CNB_API_ENDPOINT:-https://api.cnb.cool}/${CNB_REPO_SLUG}/-/pulls" \
              -H "Authorization: Bearer ${CNB_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"title\": \"sync: 上游 volt-gui 更新 (${DATE_STAMP})\",
                \"body\": \"自动同步上游 [volt-gui](https://cnb.cool/aizhuliren/volt-gui) 的最新提交。\\n\\n---\\n_由 CNB CI 定时任务自动生成._\",
                \"head\": \"${SYNC_BRANCH}\",
                \"base\": \"main\"
              }" 2>/dev/null || echo "failed")

            if echo "$RESPONSE" | grep -q '"iid"'; then
              PR_IID=$(echo "$RESPONSE" | grep -o '"iid":[0-9]*' | head -1 | cut -d: -f2)
              echo "Pull request created: ${CNB_REPO_URL_HTTPS}/-/pulls/${PR_IID}"
            else
              echo "PR creation response: $RESPONSE"
              echo "Note: If PR already exists, the sync branch has been updated."
            fi
