# CNB 云原生构建配置 — VoltUI
#
# 当前自动构建和发版只使用 GitHub Actions：
#   - .github/workflows/desktop-ci.yml
#     PR / main push 时构建 desktop macOS / Windows / Linux 包
#   - .github/workflows/release-please-desktop.yml
#     main 上根据约定式提交维护 desktop release PR 和 desktop-v* tag
#   - .github/workflows/release-desktop.yml
#     desktop-v* tag 或 workflow_dispatch 时构建并上传桌面端多平台资产
#
# CNB 不再执行构建、测试、推 tag 或创建 release，避免双轨自动化。

main:
  push:
    - docker:
        image: alpine:3.20
      stages:
        - name: github-actions-only
          script: |
            echo "VoltUI desktop build and release automation is handled by GitHub Actions only."
            echo "CNB is intentionally a no-op for build/release."
