# CNB 云原生构建配置 — VoltUI (Go)
# 参考: https://docs.cnb.cool/zh/build/configuration.md
#
# VoltUI 1.x: Go 重写版 (upstream main-v2)
# 构建依赖: Go 1.25+, Wails (桌面端)

main:
  push:
    - docker:
        image: golang:1.25
      stages:
        - name: build-cli
          script: |
            make build

        - name: test
          script: |
            go test ./...

  # ------------------------------------------------------------------
  # 定时同步上游 GitHub 仓库 (每天 09:00 CST)
  # 上游已从 main 切换到 main-v2 (Go 重写分支)
  # ------------------------------------------------------------------
  "crontab: 0 9 * * *":
    - name: sync-upstream
      docker:
        image: golang:1.25
      env:
        GIT_AUTHOR_NAME: "VoltUI Bot"
        GIT_AUTHOR_EMAIL: "bot@voltui.dev"
        GIT_COMMITTER_NAME: "VoltUI Bot"
        GIT_COMMITTER_EMAIL: "bot@voltui.dev"
      stages:
        - name: configure-git
          script: |
            git config --global user.name "$GIT_COMMITTER_NAME"
            git config --global user.email "$GIT_COMMITTER_EMAIL"
            git config --global init.defaultBranch main

        - name: sync-upstream
          script: |
            chmod +x scripts/sync-upstream.sh
            bash scripts/sync-upstream.sh || {
              echo "::warning:: Upstream sync had issues, check logs"
              exit 0
            }

        - name: create-pull-request
          script: |
            # Check if a PR already exists for this branch
            DATE_STAMP=$(date +%Y-%m-%d)
            SYNC_BRANCH="sync/upstream-${DATE_STAMP}"

            # Push the sync branch
            git push origin "$SYNC_BRANCH" --force-with-lease 2>/dev/null || true

            # Create PR via CNB API
            RESPONSE=$(curl -s -X POST \
              "https://api.cnb.cool/repos/${CNB_REPO_SLUG}/pulls" \
              -H "Authorization: Bearer ${CNB_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"title\": \"sync: upstream GitHub commits (${DATE_STAMP}) — Go rewrite (main-v2)\",
                \"body\": \"Automated upstream sync from [esengine/voltui](https://github.com/esengine/voltui) (main-v2 branch).\\n\\nThis PR merges new commits from the upstream Go rewrite with VoltUI branding replacements applied.\\n\\n---\\n_Auto-generated by CNB CI crontab workflow._\",
                \"head\": \"${SYNC_BRANCH}\",
                \"base\": \"main\"
              }" 2>/dev/null || echo "failed")

            if echo "$RESPONSE" | grep -q '"iid"'; then
              PR_IID=$(echo "$RESPONSE" | grep -o '"iid":[0-9]*' | head -1 | cut -d: -f2)
              echo "Pull request created: ${CNB_REPO_URL_HTTPS}/-/pulls/${PR_IID}"
            else
              echo "PR creation response: $RESPONSE"
              echo "Note: If PR already exists, the sync branch has been updated."
            fi
