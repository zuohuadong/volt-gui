name: Bug report
description: Report a bug in voltui
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Pick which version line you're on below — it gets
        labeled (`v1`/`v2`) automatically, no maintainer action needed.
  - type: dropdown
    id: version-line
    attributes:
      label: Version line
      description: Which line are you running?
      options:
        - "v2 — Go rewrite (1.x), main-v2 (active development)"
        - "v1 — Legacy TypeScript (0.x), maintenance only"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Exact version
      description: Output of `voltui --version`.
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: e.g. macOS 15.3 (arm64), Ubuntu 24.04, Windows 11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error output. Automatically formatted as code.
      render: shell
    validations:
      required: false
