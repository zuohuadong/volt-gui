name: Desktop CI

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/desktop-ci.yml"
      - ".github/workflows/release-desktop.yml"
      - "desktop/**"
      - "scripts/desktop-build.sh"
  push:
    branches: [main]
    paths:
      - ".github/workflows/desktop-ci.yml"
      - ".github/workflows/release-desktop.yml"
      - "desktop/**"
      - "scripts/desktop-build.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14, platform: darwin/universal, name: darwin-universal }
          - { runner: windows-latest, platform: windows/amd64, name: windows-amd64 }
          - { runner: ubuntu-22.04, platform: linux/amd64, name: linux-amd64 }
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod
          cache: true
          cache-dependency-path: desktop/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install NSIS
        if: runner.os == 'Windows'
        run: |
          choco install nsis -y --no-progress
          echo "C:\Program Files (x86)\NSIS" >> "$GITHUB_PATH"

      - name: Install create-dmg
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build desktop package
        run: scripts/desktop-build.sh "${{ matrix.platform }}" "v0.0.0-ci.${{ github.run_number }}"

      - uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7
