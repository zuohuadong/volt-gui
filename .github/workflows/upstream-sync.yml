name: Upstream Sync

on:
  schedule:
    # Every day at 05:00 UTC+8 (21:00 UTC previous day)
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Run selective upstream sync
        run: bash scripts/upstream-sync.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        run: |
          # Commit as the official GitHub Actions bot so sync PRs are clearly
          # automated and attributable.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="sync/upstream-$(date -u +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git commit -m "sync: upstream Go backend changes ($(date -u +%Y-%m-%d)) with VoltUI branding

          Auto-generated by upstream-sync workflow.
          Selective sync: Go backend only, Svelte frontend preserved."
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "sync: upstream changes $(date -u +%Y-%m-%d)" \
            --body "Automated upstream sync from esengine/DeepSeek-Reasonix.

          Applies Go backend, CLI, config, control, sandbox, and plugin changes.
          Skips all React frontend changes (Svelte is the sole frontend).
          Upstream reasonix references replaced with voltui branding.

          Review the diff carefully before merging." \
            --base main \
            --head "$BRANCH")
          # Attach the upstream-sync label only when it already exists in the
          # repo. Never create a remote label, and never fail PR creation when
          # the label is absent (forks/mirrors may not have it).
          if gh label list --json name -q '.[].name' | grep -qx 'upstream-sync'; then
            gh pr edit "$PR_URL" --add-label "upstream-sync" || true
          else
            echo "label 'upstream-sync' not found; PR created without it"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
