version: 2
project_name: voltui

before:
  hooks:
    - go mod download

builds:
  - id: voltui
    main: ./cmd/voltui
    binary: voltui
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Tag }}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

archives:
  - id: voltui
    ids: [voltui]
    name_template: "voltui-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - THIRD-PARTY-NOTICES

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

homebrew_casks:
  - name: voltui
    ids: [voltui]
    # Prereleases (v*-rc*) must not update the stable tap; brew has no separate
    # prerelease channel, so a pushed rc cask becomes the default `brew install`.
    skip_upload: "auto"
    repository:
      owner: esengine
      name: homebrew-voltui
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/esengine/voltui"
    description: "Cache-first DeepSeek coding agent for the terminal."
    commit_author:
      name: voltui
      email: voltui@deepseek.com
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/voltui"]
          end

release:
  prerelease: auto
  name_template: "VoltUI CLI {{ .Tag }}"
