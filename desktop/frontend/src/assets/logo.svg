<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" role="img" aria-label="西谷智灯暗涌系统">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c2d48"/>
      <stop offset="40%" stop-color="#1b6ca8"/>
      <stop offset="100%" stop-color="#5bc0eb"/>
    </linearGradient>
    <linearGradient id="gm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c2d48"/>
      <stop offset="100%" stop-color="#5bc0eb"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(55, 60)" filter="url(#glow)">
    <path d="M -35,0 C -35,-22 -12,-35 0,-35 C 12,-35 35,-22 35,0 C 35,22 12,35 0,35 C -12,35 -35,22 -35,0 Z" fill="none" stroke="url(#gm)" stroke-width="2.5" opacity="0.55">
      <animate attributeName="opacity" values="0.4;0.75;0.4" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M -22,0 C -22,-14 -8,-22 0,-22 C 8,-22 22,-14 22,0 C 22,14 8,22 0,22 C -8,22 -22,14 -22,0 Z" fill="none" stroke="url(#gm)" stroke-width="2" opacity="0.7">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.6s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M -10,0 C -10,-7 -4,-10 0,-10 C 4,-10 10,-7 10,0 C 10,7 4,10 0,10 C -4,10 -10,7 -10,0 Z" fill="url(#gm)" opacity="0.85">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M -30,6 Q -15,-3 0,6 Q 15,15 30,6" fill="none" stroke="#5bc0eb" stroke-width="1.2" stroke-linecap="round" opacity="0.45">
      <animate attributeName="d" values="M -30,6 Q -15,-3 0,6 Q 15,15 30,6;M -30,3 Q -15,12 0,3 Q 15,-6 30,3;M -30,6 Q -15,-3 0,6 Q 15,15 30,6" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
  <text x="110" y="52" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif" font-size="42" font-weight="800" fill="url(#g)" letter-spacing="8">西谷智灯暗涌系统</text>
  <text x="110" y="80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="600" fill="#2d8cc4" letter-spacing="6">ANYONG</text>
  <text x="110" y="105" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif" font-size="11" fill="#64748b" letter-spacing="0.5">西谷AI · 本土化编码 Agent · 离线优先 · 内网就绪</text>
