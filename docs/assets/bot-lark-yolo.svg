<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Lark bot YOLO mode interaction</title>
  <desc id="desc">A synthetic Lark chat showing the user enabling YOLO and Reasonix confirming that ordinary tool approvals are skipped.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111827" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="orange" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff7a45"/>
      <stop offset="1" stop-color="#ff4d2e"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#f7f6f3"/>
  <text x="72" y="82" fill="#15171a" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="750">Lark YOLO mode</text>
  <text x="72" y="118" fill="#69707d" font-family="Inter, Arial, sans-serif" font-size="18">Turn on YOLO from chat when you trust the task and want fewer approval prompts.</text>

  <rect x="72" y="158" width="760" height="500" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="72" y="158" width="760" height="58" rx="24" fill="#fdf1ec"/>
  <circle cx="113" cy="188" r="15" fill="#ff5b3a"/>
  <text x="140" y="197" fill="#20242b" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Lark chat</text>

  <rect x="560" y="248" width="194" height="58" rx="18" fill="#eaf2ff"/>
  <text x="612" y="284" fill="#1f2a44" font-family="Menlo, Consolas, monospace" font-size="20">/yolo</text>

  <circle cx="126" cy="386" r="22" fill="url(#orange)"/>
  <text x="117" y="395" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="760">R</text>
  <rect x="164" y="330" width="548" height="120" rx="18" fill="#f4f5f7" stroke="#e1e4ea"/>
  <text x="196" y="372" fill="#101418" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="760">YOLO enabled</text>
  <text x="196" y="410" fill="#4f5663" font-family="Inter, Arial, sans-serif" font-size="18">Ordinary tool approvals will be skipped.</text>
  <text x="196" y="438" fill="#4f5663" font-family="Inter, Arial, sans-serif" font-size="18">Ask questions and plan approvals still wait.</text>

  <rect x="474" y="492" width="280" height="58" rx="18" fill="#eaf2ff"/>
  <text x="502" y="528" fill="#1f2a44" font-family="Inter, Arial, sans-serif" font-size="19">Fix the lint errors</text>

  <rect x="164" y="582" width="500" height="42" rx="13" fill="#f4f5f7" stroke="#e1e4ea"/>
  <text x="196" y="609" fill="#4f5663" font-family="Inter, Arial, sans-serif" font-size="17">Running tools: explore -> edit -> test</text>

  <rect x="878" y="210" width="330" height="360" rx="24" fill="#15171a"/>
  <text x="914" y="266" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="750">Useful commands</text>
  <rect x="914" y="306" width="244" height="42" rx="12" fill="#242933"/>
  <text x="936" y="333" fill="#ffffff" font-family="Menlo, Consolas, monospace" font-size="18">/yolo on</text>
  <rect x="914" y="366" width="244" height="42" rx="12" fill="#242933"/>
  <text x="936" y="393" fill="#ffffff" font-family="Menlo, Consolas, monospace" font-size="18">/mode ask</text>
  <rect x="914" y="426" width="244" height="42" rx="12" fill="#242933"/>
  <text x="936" y="453" fill="#ffffff" font-family="Menlo, Consolas, monospace" font-size="18">/status</text>
  <text x="914" y="514" fill="#b8c0cc" font-family="Inter, Arial, sans-serif" font-size="17">Use Ask mode again for risky work.</text>
</svg>
