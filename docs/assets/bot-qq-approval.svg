<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">QQ bot approval interaction</title>
  <desc id="desc">A synthetic QQ conversation showing a Reasonix approval prompt with inline keyboard buttons and text command fallback.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111827" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="qqblue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#12b7f5"/>
      <stop offset="1" stop-color="#2378ff"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#f6f4ef"/>
  <text x="72" y="82" fill="#15171a" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="750">QQ approval buttons</text>
  <text x="72" y="118" fill="#69707d" font-family="Inter, Arial, sans-serif" font-size="18">QQ uses an inline keyboard for approvals, with numeric replies and slash commands as fallback.</text>

  <rect x="88" y="152" width="520" height="512" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="88" y="152" width="520" height="70" rx="34" fill="#f7f9fc"/>
  <circle cx="132" cy="187" r="18" fill="url(#qqblue)"/>
  <text x="123" y="196" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="760">Q</text>
  <text x="164" y="196" fill="#20242b" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750">QQ Bot</text>

  <rect x="134" y="262" width="386" height="154" rx="18" fill="#f0f3f8" stroke="#e2e7ef"/>
  <text x="164" y="304" fill="#101418" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="750">Approval required</text>
  <text x="164" y="338" fill="#4f5663" font-family="Inter, Arial, sans-serif" font-size="17">Tool: bash</text>
  <text x="164" y="368" fill="#4f5663" font-family="Inter, Arial, sans-serif" font-size="17">Action: go test ./...</text>
  <rect x="164" y="386" width="86" height="28" rx="9" fill="#ffffff" stroke="#d7dbe3"/>
  <text x="181" y="406" fill="#313844" font-family="Menlo, Consolas, monospace" font-size="14">ID: 42</text>

  <rect x="164" y="442" width="146" height="46" rx="13" fill="#2378ff"/>
  <text x="197" y="472" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Allow once</text>
  <rect x="326" y="442" width="102" height="46" rx="13" fill="#ffffff" stroke="#f05b57" stroke-width="2"/>
  <text x="360" y="472" fill="#d93025" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Deny</text>

  <rect x="414" y="536" width="90" height="54" rx="18" fill="#dff1ff"/>
  <text x="450" y="570" fill="#104d88" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="760">1</text>

  <rect x="672" y="202" width="536" height="398" rx="24" fill="#15171a"/>
  <text x="714" y="258" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="750">Fallback commands</text>
  <circle cx="728" cy="314" r="6" fill="#52c41a"/>
  <text x="748" y="322" fill="#e9eef8" font-family="Inter, Arial, sans-serif" font-size="18">Tap Allow once, reply 1, or send /approve 42.</text>
  <circle cx="728" cy="374" r="6" fill="#ff4d4f"/>
  <text x="748" y="382" fill="#e9eef8" font-family="Inter, Arial, sans-serif" font-size="18">Tap Deny, reply 2, or send /deny 42.</text>
  <circle cx="728" cy="434" r="6" fill="#ffaa33"/>
  <text x="748" y="442" fill="#e9eef8" font-family="Inter, Arial, sans-serif" font-size="18">For Ask prompts, reply with an option number.</text>
  <rect x="714" y="492" width="330" height="52" rx="14" fill="#242933"/>
  <text x="738" y="525" fill="#ffffff" font-family="Menlo, Consolas, monospace" font-size="18">/answer ask-1 2</text>
</svg>
