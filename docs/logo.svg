<svg xmlns="http://www.w3.org/2000/svg" width="760" height="170" viewBox="0 0 760 170" role="img" aria-label="西谷智灯暗涌系统 Anyong — 西谷AI 本土化编码 Agent">
  <title>西谷智灯暗涌系统 Anyong</title>
  <defs>
    <!-- 深海暗涌渐变：深蓝 → 青蓝 → 亮青，象征暗流涌动 -->
    <linearGradient id="ay-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c2d48"/>
      <stop offset="20%" stop-color="#145374"/>
      <stop offset="40%" stop-color="#1b6ca8"/>
      <stop offset="60%" stop-color="#2d8cc4"/>
      <stop offset="80%" stop-color="#3daee9"/>
      <stop offset="100%" stop-color="#5bc0eb"/>
    </linearGradient>
    <linearGradient id="ay-grad-mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c2d48"/>
      <stop offset="40%" stop-color="#1b6ca8"/>
      <stop offset="100%" stop-color="#5bc0eb"/>
    </linearGradient>
    <linearGradient id="ay-wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5bc0eb" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0c2d48" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 品牌标记：三层涌动波浪，象征暗流涌动 -->
  <g transform="translate(85, 85)" filter="url(#glow)">
    <!-- 外层涌动弧 -->
    <path d="M -42,0 C -42,-28 -14,-42 0,-42 C 14,-42 42,-28 42,0 C 42,28 14,42 0,42 C -14,42 -42,28 -42,0 Z"
          fill="none"
          stroke="url(#ay-grad-mark)"
          stroke-width="3"
          stroke-linejoin="round"
          opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- 中层涌动弧 -->
    <path d="M -28,0 C -28,-18 -10,-28 0,-28 C 10,-28 28,-18 28,0 C 28,18 10,28 0,28 C -10,28 -28,18 -28,0 Z"
          fill="none"
          stroke="url(#ay-grad-mark)"
          stroke-width="2.5"
          stroke-linejoin="round"
          opacity="0.75">
      <animate attributeName="opacity" values="0.5;0.95;0.5" dur="2.6s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <!-- 内层涌动核心 -->
    <path d="M -12,0 C -12,-8 -5,-12 0,-12 C 5,-12 12,-8 12,0 C 12,8 5,12 0,12 C -5,12 -12,8 -12,0 Z"
          fill="url(#ay-grad-mark)"
          opacity="0.9">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <!-- 涌动波纹线 -->
    <path d="M -38,8 Q -20,-4 0,8 Q 20,20 38,8"
          fill="none"
          stroke="#5bc0eb"
          stroke-width="1.5"
          stroke-linecap="round"
          opacity="0.5">
      <animate attributeName="d"
               values="M -38,8 Q -20,-4 0,8 Q 20,20 38,8;M -38,4 Q -20,16 0,4 Q 20,-8 38,4;M -38,8 Q -20,-4 0,8 Q 20,20 38,8"
               dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M -32,-6 Q -14,-18 0,-6 Q 14,6 32,-6"
          fill="none"
          stroke="#3daee9"
          stroke-width="1.2"
          stroke-linecap="round"
          opacity="0.4">
      <animate attributeName="d"
               values="M -32,-6 Q -14,-18 0,-6 Q 14,6 32,-6;M -32,-10 Q -14,2 0,-10 Q 14,-22 32,-10;M -32,-6 Q -14,-18 0,-6 Q 14,6 32,-6"
               dur="3.5s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" begin="0.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 西谷智灯暗涌系统中文品牌名 -->
  <text x="160" y="88"
        font-family="'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', 'Source Han Sans CN', sans-serif"
        font-size="56"
        font-weight="800"
        fill="url(#ay-grad)"
        letter-spacing="12">西谷智灯暗涌系统
    <animate attributeName="opacity" values="0.92;1;0.92" dur="3.2s" repeatCount="indefinite"/>
  </text>

  <!-- ANYONG 英文副标识 -->
  <text x="160" y="118"
        font-family="ui-monospace, SFMono-Regular, 'Cascadia Code', Menlo, Consolas, monospace"
        font-size="18"
        font-weight="600"
        fill="#2d8cc4"
        letter-spacing="8">ANYONG</text>

  <!-- 标语 -->
  <text x="160" y="148"
        font-family="'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif"
        font-size="13"
        fill="#64748b"
        letter-spacing="0.5">西谷AI 本土化编码 Agent  ·  离线优先  ·  多模型  ·  内网就绪</text>
</svg>
