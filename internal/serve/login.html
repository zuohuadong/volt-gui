<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VoltUI — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .login-box {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 12px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .login-box h1 {
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 8px;
    color: #e94560;
  }
  .login-box .subtitle {
    text-align: center;
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
  }
  .login-box label {
    display: block;
    font-size: 13px;
    color: #aaa;
    margin-bottom: 6px;
  }
  .login-box input[type="password"] {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #0f3460;
    border-radius: 8px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-box input[type="password"]:focus {
    border-color: #e94560;
  }
  .login-box button {
    width: 100%;
    margin-top: 20px;
    padding: 10px 0;
    border: none;
    border-radius: 8px;
    background: #e94560;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .login-box button:hover { background: #d63851; }
  .error {
    background: rgba(233, 69, 96, 0.15);
    border: 1px solid #e94560;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #e94560;
    margin-bottom: 18px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="login-box">
  <h1>VoltUI</h1>
  <p class="subtitle">Enter the password to continue</p>
  <!--ERROR-->
  <form method="post" action="/login">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autofocus autocomplete="current-password" placeholder="••••••••">
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
