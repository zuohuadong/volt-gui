# VoltUI configuration.
# Resolution order: flag > ./voltui.toml > ~/.config/voltui/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

default_model = "deepseek"   # a provider name (→ its default model) or "provider/model"
# language      = "zh"   # ui language; empty = auto-detect from $LANG / $VOLTUI_LANG

# White-label / OEM branding — replace the product name and logos for your
# enterprise deployment. Environment variables override config values:
#   VOLTUI_BRAND_NAME       → brand.name
#   VOLTUI_BRAND_SHORT_NAME → brand.short_name
#   VOLTUI_BRAND_LOGO       → brand.logo_path       (PNG/SVG/JPG/ICO)
#   VOLTUI_BRAND_WORDMARK   → brand.wordmark_path   (PNG/SVG/JPG)
#   VOLTUI_BRAND_ICON       → brand.icon_path       (PNG on macOS/Linux, ICO on Windows)
# Leave commented out to use the default "VoltUI" identity.
# [brand]
# name        = "VoltUI"          # window title, tray tooltip, onboarding
# short_name  = "VU"              # compact form (macOS menu bar, Linux app name)
# logo_path   = "C:\\Program Files\\MyCorp\\logo.png"          # icon-only logo
# wordmark_path = "C:\\Program Files\\MyCorp\\logo-wordmark.png"  # logo + text
# icon_path   = "C:\\Program Files\\MyCorp\\tray-icon.ico"  # tray/taskbar icon

[ui]
theme = "auto"   # auto|dark|light; controls CLI colors only; VOLTUI_THEME can override per run
# theme_style = "graphite"   # graphite|ember|aurora|midnight|sandstone|porcelain|linen|glacier

[agent]
system_prompt = """
You are VoltUI, a coding agent focused on executing code tasks.
Use the provided tools to read and write files and run shell commands.
Principles: understand the request before acting; verify with tools instead of
guessing; keep changes minimal and correct; briefly summarize what you did."""
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
max_steps   = 25
temperature = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps the cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# planner_model = "mimo-pro"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# output_style = "explanatory"   # persona/tone folded into the prompt: explanatory | learning | concise,
#                                  or a custom .voltui/output-styles/<name>.md ; empty = default

# A provider is a vendor endpoint (one base_url + key) that offers one or more
# models. Use `models = [...]` to expose several under a single entry — switching
# models reuses the same connection; no need to re-declare base_url/api_key.
[[providers]]
name        = "deepseek"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-flash", "deepseek-v4-pro"]
default     = "deepseek-v4-flash"   # optional; defaults to the first of `models`
api_key_env = "DEEPSEEK_API_KEY"
context_window = 1000000
price       = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }   # per 1M tokens
# DeepSeek thinking is always on; effort: high | max. Omit for auto (provider default).
effort      = "high"

# A single-model provider still works (use `model = "..."`) — pick this form when a
# model needs its own base_url / context_window / price (e.g. the two MiMo SKUs
# below have different context windows).
price       = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" }   # per 1M tokens

[[providers]]
name           = "mimo-pro"
kind           = "openai"
base_url       = "https://api.xiaomimimo.com/v1"
model          = "mimo-v2.5-pro"   # thinking-mode on by default; reasoning_content rendered dim above the answer
api_key_env    = "MIMO_API_KEY"
context_window = 1000000

[[providers]]
name           = "mimo-flash"
kind           = "openai"
base_url       = "https://api.xiaomimimo.com/v1"
model          = "mimo-v2-flash"   # thinking-mode off by default; cheaper / faster
api_key_env    = "MIMO_API_KEY"
context_window = 65536

# Custom /effort levels for a provider. When supported_efforts is set, the
# /effort command exposes these levels; default_effort is what "/effort auto"
# (or unset) resolves to. Leave both commented to keep the built-in defaults
# (DeepSeek: high|max; Anthropic: low|medium|high|xhigh|max). Other kinds
# (e.g. mimo-pro) don't expose /effort unless you opt in here.
#
# [[providers]]
# name           = "mimo-custom"
# kind           = "openai"
# base_url       = "https://token-plan-cn.xiaomimimo.com/v1"
# model          = "mimo-v2.5-pro"
# api_key_env    = "MIMO_API_KEY"
# supported_efforts = ["low", "medium", "high"]
# default_effort    = "high"

# Anthropic (Claude) — the "anthropic" kind speaks the Messages API directly (no
# OpenAI shim). base_url is optional (defaults to https://api.anthropic.com). Note:
# this provider does not enable extended thinking and does not send temperature —
# current Claude models reject sampling params (see internal/provider/anthropic).
[[providers]]
name           = "claude"
kind           = "anthropic"
model          = "claude-opus-4-8"
api_key_env    = "ANTHROPIC_API_KEY"
context_window = 1000000
price          = { cache_hit = 0.5, input = 5, output = 25, currency = "$" }   # per 1M tokens
# Extended thinking (anthropic kind only; round-trips the signed reasoning block
# across tool calls). Omit to disable. effort: low | medium | high | xhigh | max.
thinking       = "adaptive"
effort         = "high"

[tools]
enabled = []   # empty = all built-in tools

# CodeGraph code intelligence (symbol/call-graph search via tree-sitter + SQLite),
# a built-in MCP server giving the agent codegraph_* search / context / explore /
# trace / node tools. Off by default for first-run sessions. Once enabled, the
# runtime is fetched into a per-version cache when missing (auto_install);
# .codegraph/ is then initialised (fast) and CodeGraph's daemon indexes in the
# background. Choose tier the same way as ordinary MCP servers.
# [codegraph]
# enabled      = false
# auto_install = true
# path         = ""   # empty = cache, then PATH, then a bundle beside voltui
# tier         = "lazy"   # lazy | background | eager

# Skills are invokable playbooks (SKILL.md / <name>.md with frontmatter), found
# under .voltui/skills, .agents/skills, .agent/skills, .claude/skills (project)
# and the same dirs under ~ (global). Built-ins (explore/research/review/security-review/test)
# ship out of the box. The model invokes them via run_skill / explore / …; you
# invoke them via /<name>. Manage with /skill (list, show, enable, disable, new, paths).
# [skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra "custom"-scope skill roots
# disabled_skills = ["review"]                  # hide from prompt, slash invocation, and skill tools

# Hooks run shell commands around the loop (PreToolUse / PostToolUse /
# UserPromptSubmit / Stop). They are NOT configured here — put them in
# settings.json: ~/.voltui/settings.json (global, always on) and
# <project>/.voltui/settings.json (project, runs only after `/hooks trust`).
# Exit 0 = pass, exit 2 = block (PreToolUse / UserPromptSubmit only). Example
# ~/.voltui/settings.json:
#   { "hooks": {
#       "PreToolUse":  [ { "match": "bash", "command": "my-guard.sh" } ],
#       "PostToolUse": [ { "match": ".*file", "command": "gofmt -w ." } ],
#       "Stop":        [ { "command": "notify-send 'turn done'" } ] } }

# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow"} as JSON on stdin.
# [statusline]
# command = "my-statusline.sh"

# External stdio plugins (MCP-compatible); each is a standalone executable.
# [[plugins]]
# name    = "example"
# command = "voltui-plugin-example"
# tier    = "lazy"  # eager | lazy (default) | background
# # tier guidance:
# #   eager      — handshake at boot; the agent waits. Use when the plugin's
# #                tools must be in the very first turn's system prompt.
# #   lazy       — placeholder tools (from cached schema, when present) until
# #                the model uses them, then handshake on-demand. Default.
# #   background — placeholder + spawn at boot in a goroutine so an idle
# #                session warms up without blocking the user.
